apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-web
  namespace: bienvenucloud-dev
  labels:
    app: web
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: web
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 512Mi
        devices:
          disks:
            - name: rootdisk
              disk: { bus: virtio }
            - name: cloudinitdisk
              disk: { bus: virtio }
          interfaces:
            - name: default
              masquerade: {}
            - name: dmz
              bridge: {}
      networks:
        - name: default
          pod: {}
        - name: dmz
          multus:
            networkName: dmz-network
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              runcmd:
                - apt-get update -y && apt-get install -y nginx
                - systemctl enable nginx && systemctl start nginx
                - ip link set enp2s0 up
                - ip addr add 192.168.100.10/24 dev enp2s0
                - ip route add default via 192.168.100.1
                - echo "<h1>Architecture 3-tiers OK 🚀</h1>" > /var/www/html/index.html
